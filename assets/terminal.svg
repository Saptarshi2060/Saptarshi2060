<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="scanFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0" numOctaves="1" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Terminal window bg -->
  <rect width="900" height="400" fill="url(#termBg)" rx="12"/>
  <rect width="900" height="400" fill="none" stroke="#30363D" stroke-width="1" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="42" fill="#161B22" rx="12"/>
  <rect x="0" y="30" width="900" height="12" fill="#161B22"/>

  <!-- Window control dots -->
  <circle cx="24" cy="21" r="6" fill="#FF5F57"/>
  <circle cx="44" cy="21" r="6" fill="#FEBC2E"/>
  <circle cx="64" cy="21" r="6" fill="#28C840"/>

  <!-- Title -->
  <text x="450" y="26" font-family="'JetBrains Mono',monospace"
        font-size="12" fill="#8B949E" text-anchor="middle" letter-spacing="2">
    saptarshi@dev:~
  </text>

  <!-- Divider -->
  <line x1="0" y1="42" x2="900" y2="42" stroke="#30363D" stroke-width="1"/>

  <!-- Subtle scanlines overlay for CRT effect -->
  <rect x="0" y="42" width="900" height="358" fill="none"
        stroke="#8B949E" stroke-width="0" opacity="0.04"/>

  <!-- ═══ TERMINAL CONTENT ═══ -->
  <!-- Each line appears with a tiny opacity animation to simulate typing appearing -->

  <!-- Line 1 -->
  <text x="24" y="74" font-family="'JetBrains Mono',monospace" font-size="13" fill="#8B949E">
    <tspan fill="#39D353">saptarshi</tspan>
    <tspan fill="#8B949E">@</tspan>
    <tspan fill="#58A6FF">dev</tspan>
    <tspan fill="#8B949E">:~ $ </tspan>
    <tspan fill="#C9D1D9">whoami</tspan>
  </text>
  <text x="24" y="94" font-family="'JetBrains Mono',monospace" font-size="13" fill="#C9D1D9">
    → Saptarshi Biswas — software developer · builder · learner
  </text>

  <!-- Line 2 -->
  <text x="24" y="122" font-family="'JetBrains Mono',monospace" font-size="13" fill="#8B949E">
    <tspan fill="#39D353">saptarshi</tspan>
    <tspan fill="#8B949E">@</tspan>
    <tspan fill="#58A6FF">dev</tspan>
    <tspan fill="#8B949E">:~ $ </tspan>
    <tspan fill="#C9D1D9">cat focus.txt</tspan>
