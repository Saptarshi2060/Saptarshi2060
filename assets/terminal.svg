  <text x="90" y="317" font-family="'JetBrains Mono',monospace" font-size="12" fill="#C9D1D9"> init: scaffold new project with Next.js 15</text>

  <!-- Line 5 - current prompt with blinking cursor -->
  <text x="24" y="348" font-family="'JetBrains Mono',monospace" font-size="13" fill="#8B949E">
