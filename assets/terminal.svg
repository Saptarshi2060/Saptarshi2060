    <tspan fill="#8B949E">@</tspan>
    <tspan fill="#58A6FF">dev</tspan>
    <tspan fill="#8B949E">:~ $ </tspan>
    <tspan fill="#C9D1D9">git log --oneline -5</tspan>
  </text>
  <text x="24" y="257" font-family="'JetBrains Mono',monospace" font-size="12" fill="#D29922">a1b2c3d</text>
  <text x="90" y="257" font-family="'JetBrains Mono',monospace" font-size="12" fill="#C9D1D9"> feat: improve ML pipeline performance by 40%</text>
  <text x="24" y="272" font-family="'JetBrains Mono',monospace" font-size="12" fill="#D29922">e4f5a6b</text>
  <text x="90" y="272" font-family="'JetBrains Mono',monospace" font-size="12" fill="#C9D1D9"> fix: resolve async race condition in API layer</text>
  <text x="24" y="287" font-family="'JetBrains Mono',monospace" font-size="12" fill="#D29922">7c8d9e0</text>
  <text x="90" y="287" font-family="'JetBrains Mono',monospace" font-size="12" fill="#C9D1D9"> refactor: clean up React component architecture</text>
  <text x="24" y="302" font-family="'JetBrains Mono',monospace" font-size="12" fill="#D29922">1a2b3c4</text>
  <text x="90" y="302" font-family="'JetBrains Mono',monospace" font-size="12" fill="#C9D1D9"> chore: update dependencies and config</text>
