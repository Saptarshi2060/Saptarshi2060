    <tspan>  </tspan>
    <tspan fill="#39D353">django</tspan>
    <tspan>  </tspan>
    <tspan fill="#39D353">flask</tspan>
    <tspan>  </tspan>
    <tspan fill="#D29922">mongodb</tspan>
    <tspan>  </tspan>
    <tspan fill="#D29922">mysql</tspan>
    <tspan>  </tspan>
    <tspan fill="#BC8CFF">figma</tspan>
    <tspan>  </tspan>
    <tspan fill="#BC8CFF">linux</tspan>
