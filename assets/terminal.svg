    <tspan fill="#8B949E">@</tspan>
    <tspan fill="#58A6FF">dev</tspan>
    <tspan fill="#8B949E">:~ $ </tspan>
  </text>

  <!-- Blinking cursor at end of prompt -->
  <rect x="124" y="335" width="9" height="16" rx="1" fill="#58A6FF">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom status line -->
  <line x1="0" y1="370" x2="900" y2="370" stroke="#30363D" stroke-width="0.8"/>
  <rect x="0" y="370" width="900" height="30" fill="#161B22" rx="0"/>
  <rect x="0" y="382" width="900" height="18" fill="#161B22"/>
  <rect x="0" y="370" width="900" height="30" fill="#161B22" rx="12"/>
  <rect x="0" y="370" width="900" height="12" fill="#161B22"/>

  <!-- Status bar content -->
  <text x="24" y="390" font-family="'JetBrains Mono',monospace"
        font-size="10" fill="#39D353" letter-spacing="1">● NORMAL</text>
  <text x="120" y="390" font-family="'JetBrains Mono',monospace"
        font-size="10" fill="#8B949E">  ~/saptarshi2060/readme.md</text>
  <text x="700" y="390" font-family="'JetBrains Mono',monospace"
        font-size="10" fill="#8B949E" text-anchor="start">UTF-8  ·  LF  ·  zsh</text>
  <text x="876" y="390" font-family="'JetBrains Mono',monospace"
        font-size="10" fill="#58A6FF" text-anchor="end">∞:∞</text>

</svg>
