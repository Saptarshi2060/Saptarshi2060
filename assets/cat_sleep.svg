<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <defs>
    <filter id="sleepGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="pillowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2128"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="900" height="140" fill="#0D1117"/>

  <!-- Stars in background -->
  <g fill="#C9D1D9">
    <circle cx="100" cy="20" r="0.8" opacity="0.4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="40" r="1" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="15" r="0.7" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="30" r="1" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="18" r="0.8" opacity="0.4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="35" r="0.9" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="55" r="0.6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="60" r="0.7" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Moon -->
  <circle cx="820" cy="28" r="14" fill="#161B22"/>
  <circle cx="826" cy="22" r="12" fill="#0D1117"/>
  <!-- Moon is a crescent -->
  <circle cx="820" cy="28" r="14" fill="#C9D1D9" opacity="0.15"/>

  <!-- Keyboard / surface the cat sleeps on -->
  <rect x="300" y="90" width="300" height="18" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <!-- Keyboard keys suggestions -->
  <g fill="#1C2128" stroke="#30363D" stroke-width="0.5">
    <rect x="308" y="93" width="12" height="8" rx="1"/>
    <rect x="324" y="93" width="12" height="8" rx="1"/>
    <rect x="340" y="93" width="12" height="8" rx="1"/>
    <rect x="356" y="93" width="12" height="8" rx="1"/>
    <rect x="372" y="93" width="12" height="8" rx="1"/>
    <rect x="388" y="93" width="28" height="8" rx="1"/><!-- spacebar -->
    <rect x="420" y="93" width="12" height="8" rx="1"/>
    <rect x="436" y="93" width="12" height="8" rx="1"/>
    <rect x="452" y="93" width="12" height="8" rx="1"/>
    <rect x="468" y="93" width="12" height="8" rx="1"/>
    <rect x="484" y="93" width="12" height="8" rx="1"/>
    <rect x="500" y="93" width="12" height="8" rx="1"/>
    <rect x="516" y="93" width="12" height="8" rx="1"/>
    <rect x="532" y="93" width="12" height="8" rx="1"/>
    <rect x="548" y="93" width="12" height="8" rx="1"/>
    <rect x="564" y="93" width="12" height="8" rx="1"/>
    <rect x="580" y="93" width="12" height="8" rx="1"/>
  </g>

  <!-- Pillow under cat -->
  <ellipse cx="450" cy="95" rx="80" ry="18" fill="url(#pillowGrad)" stroke="#30363D" stroke-width="1"/>

  <!-- SLEEPING CAT (centered) -->
  <g transform="translate(410, 60)" filter="url(#sleepGlow)">
    <!-- Body (curled) -->
    <ellipse cx="40" cy="32" rx="36" ry="22" fill="#C9D1D9"/>
    <!-- Belly -->
    <ellipse cx="42" cy="34" rx="22" ry="14" fill="white" opacity="0.4"/>

    <!-- Head resting on body -->
    <circle cx="18" cy="24" r="18" fill="#C9D1D9"/>
    <!-- Ear left -->
    <polygon points="6,8 0,18 12,18" fill="#C9D1D9"/>
    <polygon points="6,10 2,17 10,17" fill="#8B949E" opacity="0.3"/>
    <!-- Ear right -->
    <polygon points="24,8 18,18 30,18" fill="#C9D1D9"/>
    <polygon points="24,10 20,17 28,17" fill="#8B949E" opacity="0.3"/>

    <!-- Closed eyes (sleeping) -->
    <!-- Left eye closed (curved line) -->
    <path d="M 10,22 Q 15,26 20,22" stroke="#0D1117" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Right eye closed -->
    <path d="M 20,22 Q 25,26 30,22" stroke="#0D1117" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <ellipse cx="18" cy="27" rx="2" ry="1.5" fill="#FF7B9C"/>
    <!-- Mouth -->
    <path d="M 14,29 Q 18,33 22,29" stroke="#8B949E" stroke-width="1" fill="none"/>

    <!-- Whiskers left -->
    <line x1="2" y1="25" x2="-10" y2="23" stroke="#8B949E" stroke-width="0.8" opacity="0.5"/>
    <line x1="2" y1="27" x2="-10" y2="27" stroke="#8B949E" stroke-width="0.8" opacity="0.5"/>
    <!-- Whiskers right -->
    <line x1="34" y1="25" x2="46" y2="23" stroke="#8B949E" stroke-width="0.8" opacity="0.5"/>
    <line x1="34" y1="27" x2="46" y2="27" stroke="#8B949E" stroke-width="0.8" opacity="0.5"/>

    <!-- Collar -->
    <path d="M 4,28 Q 18,36 32,28" stroke="#58A6FF" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Tail curled around body -->
    <path d="M 72,32 Q 82,20 76,10 Q 70,2 60,8 Q 52,14 56,22" stroke="#C9D1D9" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Tail tip -->
    <circle cx="56" cy="22" r="5" fill="#C9D1D9"/>

    <!-- Breathing animation (subtle body scale) -->
    <animateTransform attributeName="transform" type="scale"
      values="1,1; 1,1.03; 1,1"
      dur="3s" repeatCount="indefinite"
      additive="sum"
      transformOrigin="40 32"/>
  </g>

  <!-- Z Z Z sleep bubbles -->
  <g filter="url(#sleepGlow)" fill="#58A6FF" font-family="'JetBrains Mono',monospace" font-weight="700">
    <!-- Small Z -->
    <text x="480" y="55" font-size="14" opacity="0">
      z
      <animate attributeName="y" values="55;35;15" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="font-size" values="14;18;22" dur="3s" repeatCount="indefinite"/>
    </text>
    <!-- Medium Z -->
    <text x="500" y="48" font-size="18" opacity="0">
      Z
      <animate attributeName="y" values="48;25;2" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="font-size" values="18;24;30" dur="3s" begin="1s" repeatCount="indefinite"/>
    </text>
    <!-- Large Z -->
    <text x="522" y="42" font-size="22" opacity="0">
      Z
      <animate attributeName="y" values="42;18;-6" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="font-size" values="22;30;38" dur="3s" begin="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Label -->
  <text x="450" y="125" font-family="'JetBrains Mono',monospace"
        font-size="11" fill="#30363D" text-anchor="middle" letter-spacing="3">
    // debug later...
  </text>

</svg>
