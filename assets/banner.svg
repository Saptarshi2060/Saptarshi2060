<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 900 320" width="900" height="320"
  style="font-family:'JetBrains Mono',monospace;">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <!-- Glass card gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161B22;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0.4" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for text -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Particle glow -->
    <filter id="particleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Blue radial glow behind name -->
    <radialGradient id="blueAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0" />
    </radialGradient>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="900" height="2" patternUnits="userSpaceOnUse">
      <line x1="0" y1="1" x2="900" y2="1" stroke="#8B949E" stroke-width="0.15" stroke-opacity="0.08"/>
    </pattern>
    <!-- Clip for glass card -->
    <clipPath id="cardClip">
      <rect x="30" y="20" width="840" height="280" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Scanlines overlay -->
  <rect width="900" height="320" fill="url(#scanlines)"/>

  <!-- Blue aura behind main content -->
  <ellipse cx="450" cy="160" rx="380" ry="160" fill="url(#blueAura)">
    <animate attributeName="rx" values="380;420;380" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="160;180;160" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Glass card -->
  <rect x="30" y="20" width="840" height="280" rx="18"
        fill="url(#glass)" stroke="#30363D" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Card inner highlight -->
  <rect x="31" y="21" width="838" height="2" rx="1" fill="#58A6FF" fill-opacity="0.08"/>

  <!-- Floating particles -->
  <g filter="url(#particleGlow)">
    <!-- Particle 1 -->
    <circle cx="80" cy="80" r="1.5" fill="#58A6FF" opacity="0.6">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 2 -->
    <circle cx="820" cy="100" r="1" fill="#79C0FF" opacity="0.5">
      <animate attributeName="cy" values="100;75;100" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 3 -->
    <circle cx="150" cy="240" r="1.2" fill="#58A6FF" opacity="0.4">
      <animate attributeName="cy" values="240;220;240" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 4 -->
    <circle cx="760" cy="250" r="1.8" fill="#79C0FF" opacity="0.5">
      <animate attributeName="cy" values="250;225;250" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 5 -->
    <circle cx="450" cy="40" r="1" fill="#58A6FF" opacity="0.3">
      <animate attributeName="cy" values="40;25;40" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 6 -->
    <circle cx="620" cy="70" r="1.3" fill="#C9D1D9" opacity="0.2">
      <animate attributeName="cy" values="70;50;70" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="7s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 7 -->
    <circle cx="280" cy="60" r="0.9" fill="#8B949E" opacity="0.3">
      <animate attributeName="cy" values="60;40;60" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.08;0.3" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 8 -->
    <circle cx="700" cy="270" r="1.1" fill="#58A6FF" opacity="0.35">
      <animate attributeName="cy" values="270;250;270" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.08;0.35" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 9 -->
    <circle cx="100" cy="180" r="1.4" fill="#79C0FF" opacity="0.25">
      <animate attributeName="cy" values="180;160;180" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.06;0.25" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 10 -->
    <circle cx="840" cy="180" r="1.6" fill="#58A6FF" opacity="0.28">
      <animate attributeName="cy" values="180;155;180" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.28;0.07;0.28" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Top-left terminal dots -->
  <circle cx="58" cy="46" r="5" fill="#FF5F57"/>
  <circle cx="76" cy="46" r="5" fill="#FEBC2E"/>
  <circle cx="94" cy="46" r="5" fill="#28C840"/>

  <!-- Top-left label -->
  <text x="115" y="50" font-family="'JetBrains Mono',monospace" font-size="10"
        fill="#8B949E" letter-spacing="1">~/saptarshi</text>

  <!-- Subtle horizontal rule below top bar -->
  <line x1="30" y1="60" x2="870" y2="60" stroke="#30363D" stroke-width="0.6" stroke-opacity="0.5"/>

  <!-- ── MAIN NAME ── -->
  <g filter="url(#textGlow)">
    <text x="450" y="130" font-family="'JetBrains Mono',monospace"
          font-size="52" font-weight="700" fill="#C9D1D9"
          text-anchor="middle" letter-spacing="-1">
      Saptarshi Biswas
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Blue underline accent -->
  <rect x="290" y="138" width="320" height="2" rx="1" fill="#58A6FF" opacity="0.7">
    <animate attributeName="width" values="0;320;320" dur="1.2s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" values="450;290;290" dur="1.2s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- ── TYPING TEXT ── -->
  <!-- Static typewriter label using SVG clipPath trick -->
  <text x="450" y="175" font-family="'JetBrains Mono',monospace"
        font-size="14" fill="#58A6FF" text-anchor="middle" letter-spacing="2" opacity="0.9">
    <tspan>software developer</tspan>
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Animated cursor after title -->
  <rect x="630" y="161" width="10" height="2" rx="1" fill="#58A6FF" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ── ROLE TAGS (glass pills) ── -->
  <!-- Pill 1 -->
  <rect x="175" y="195" width="165" height="26" rx="13"
        fill="#161B22" stroke="#30363D" stroke-width="0.8"/>
  <text x="258" y="213" font-family="'JetBrains Mono',monospace"
        font-size="10" fill="#8B949E" text-anchor="middle" letter-spacing="1.5">
    full stack dev
  </text>
  <!-- Pill 2 -->
  <rect x="368" y="195" width="165" height="26" rx="13"
        fill="#161B22" stroke="#58A6FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="451" y="213" font-family="'JetBrains Mono',monospace"
        font-size="10" fill="#58A6FF" text-anchor="middle" letter-spacing="1.5">
    machine learning
  </text>
  <!-- Pill 3 -->
  <rect x="561" y="195" width="165" height="26" rx="13"
        fill="#161B22" stroke="#30363D" stroke-width="0.8"/>
  <text x="644" y="213" font-family="'JetBrains Mono',monospace"
        font-size="10" fill="#8B949E" text-anchor="middle" letter-spacing="1.5">
    ui/ux · open source
  </text>

  <!-- ── LOCATION + STATUS ── -->
  <g>
    <!-- Location -->
    <text x="450" y="258" font-family="'JetBrains Mono',monospace"
          font-size="11" fill="#8B949E" text-anchor="middle" letter-spacing="1">
      ▸ India  ·  building things that matter
    </text>
    <!-- Status dot -->
    <circle cx="310" cy="254" r="4" fill="#39D353">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="320" y="258" font-family="'JetBrains Mono',monospace"
          font-size="11" fill="#39D353" letter-spacing="1">available</text>
  </g>

  <!-- Bottom subtle grid -->
  <g opacity="0.05">
    <line x1="30" y1="280" x2="870" y2="280" stroke="#8B949E" stroke-width="0.5"/>
    <line x1="30" y1="290" x2="870" y2="290" stroke="#8B949E" stroke-width="0.5"/>
  </g>

  <!-- Corner decorations -->
  <!-- Top-right -->
  <g opacity="0.4">
    <line x1="840" y1="25" x2="862" y2="25" stroke="#58A6FF" stroke-width="1"/>
    <line x1="862" y1="25" x2="862" y2="47" stroke="#58A6FF" stroke-width="1"/>
  </g>
  <!-- Bottom-left -->
  <g opacity="0.4">
    <line x1="38" y1="295" x2="60" y2="295" stroke="#58A6FF" stroke-width="1"/>
    <line x1="38" y1="273" x2="38" y2="295" stroke="#58A6FF" stroke-width="1"/>
  </g>

</svg>
