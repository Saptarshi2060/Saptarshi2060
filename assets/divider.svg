<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 12" width="900" height="12">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#30363D;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#30363D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#79C0FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="12" fill="#0D1117"/>

  <!-- Base divider line -->
  <rect x="0" y="5" width="900" height="1" fill="url(#divGrad)"/>

  <!-- Animated shimmer traveling across -->
  <rect x="-200" y="4" width="200" height="3" fill="url(#shimmer)" rx="1" opacity="0.8">
    <animate attributeName="x" values="-200;900" dur="3s" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <!-- Center dot accent -->
  <circle cx="450" cy="6" r="2" fill="#58A6FF" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
